<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap 3-Column Layout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Optional: Adding some color to visualize the columns */
        .column-demo {
            padding: 20px;
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            margin-bottom: 20px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="row">
        <div class="col-12 col-md-4">
            <div class="column-demo">
                <h3>Heading 1</h3>
                <p>This is the first column. On mobile, I take up the full width. On desktop, I take up 1/3 of the row.</p>
            </div>
        </div>

        <div class="col-12 col-md-4">
            <div class="column-demo">
                <h3>Heading 2</h3>
                <p>This is the middle column. I'll slide right under Column 1 when the screen gets small.</p>
            </div>
        </div>

        <div class="col-12 col-md-4">
            <div class="column-demo">
                <h3>Heading 3</h3>
                <p>This is the third column. Perfect for sidebars or additional features.</p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
